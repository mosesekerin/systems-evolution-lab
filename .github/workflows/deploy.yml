name: Deploy NotesApp to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1  # Change to your actual region — no need to store in secrets

jobs:
  deploy:
    name: Deploy CloudFormation Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete stack if in ROLLBACK_COMPLETE
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name notesapp-stack \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Current stack status: $STATUS"

          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE state — deleting before redeploy..."
            aws cloudformation delete-stack --stack-name notesapp-stack
            aws cloudformation wait stack-delete-complete --stack-name notesapp-stack
            echo "Stack deleted. Proceeding with fresh deployment."
          fi

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file .aws/cloudformation.yml \
            --stack-name notesapp-stack \
            --parameter-overrides KeyPairName=my-EC2-key \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Get app URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name notesapp-stack \
            --query 'Stacks[0].Outputs' \
            --output table
